    <style>
        .wrapper {
            position: relative;
            overflow: visible;
        }

        .text {
            position: relative;
            z-index: 1;
        }

        .highlighted {
            fill: none;
            position: absolute;
            overflow: visible;
            top: 50%;
            left: 50%;
            width: calc(100% + 20px);
            stroke-width: 9;
            height: calc(100% + 5px);
            -webkit-transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            overflow: visible;
        }

        .highlighted path {
            stroke: red;
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            animation-name: acfb-hh-dash;
            animation-iteration-count: infinite;
            animation-duration: 5s;
        }

        .highlighted path:nth-of-type(2) {
            animation-delay: 0.3s;
        }

        @keyframes acfb-hh-dash {
            0% {
                stroke-dashoffset: 1500;
            }

            15% {
                stroke-dashoffset: 0;
            }

            85% {
                opacity: 1;
            }

            90% {
                stroke-dashoffset: 0;
                opacity: 0;
            }

            100% {
                stroke-dashoffset: 1500;
                opacity: 0;
            }
        }
    </style>
</head>
