<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tatva | Image Compare</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../elements/tatva-image-compare.js"></script>

</head>

<body class="bg-red-50">
    <div class="flex flex-col items-center justify-start min-w-full min-h-screen px-4 py-8">
        <!-- Header -->
        <div class="flex flex-col items-center justify-center mb-14">
            <a href="../index.html"
                class="flex items-center justify-center px-4 py-2 text-sm font-medium tracking-wide bg-red-800 rounded-md hover:bg-red-900 text-red-50">
                <svg class="w-4 mr-1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                    </path>
                </svg>
                Browse All
            </a>
        </div>

        <!-- Trail-->
        <div class="container max-w-3xl mx-auto mt-auto mb-12">

            <!-- Title -->
            <h1 class="pb-4 mb-10 text-2xl font-medium text-center text-gray-800 border-b-2 border-red-100">
                Image Compare
            </h1>

            <!-- Demos-->
            <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
                <!-- Default -->
                <div
                    class="flex flex-col items-center p-4 pb-2 space-y-8 bg-white border rounded shadow justify-items-stretch">
                    <h2 class="text-sm font-medium text-gray-400">Default</h2>
                    <tatva-image-compare 
                        class="w-full" 
                        before="https://d-themes.com/wordpress/udesign/elements/wp-content/uploads/sites/3/2021/08/comparison-3.jpg"
                        after="https://d-themes.com/wordpress/udesign/elements/wp-content/uploads/sites/3/2021/08/comparison-4.jpg" />
                </div>
                <!-- Circle Handle-->
                <div
                    class="flex flex-col items-center p-4 pb-2 space-y-8 bg-white border rounded shadow justify-items-stretch">
                    <h2 class="text-sm font-medium text-gray-400">Circle Handle</h2>
                    <tatva-image-compare handle="circle" class="w-full" />
                </div>
                <!-- Rectangle Handle-->
                <div
                    class="flex flex-col items-center p-4 pb-2 space-y-8 bg-white border rounded shadow justify-items-stretch">
                    <h2 class="text-sm font-medium text-gray-400">Rectangle Handle</h2>
                    <tatva-image-compare handle="rectangle" class="w-full" />
                </div>
                <!-- Arrow Handle -->
                <div
                    class="flex flex-col items-center p-4 pb-2 space-y-8 bg-white border rounded shadow justify-items-stretch">
                    <h2 class="text-sm font-medium text-gray-400">Arrow Handle</h2>
                    <tatva-image-compare handle="arrow" class="w-full" />
                </div>
                <!-- Move on Hover -->
                <div
                    class="flex flex-col items-center p-4 pb-2 space-y-8 bg-white border rounded shadow justify-items-stretch">
                    <h2 class="text-sm font-medium text-gray-400">Move On Hover</h2>
                    <tatva-image-compare handle="arrow" hover="true" class="w-full" />
                </div>
                <!-- Custom Arrows -->
                <div
                    class="flex flex-col items-center p-4 pb-2 space-y-8 bg-white border rounded shadow justify-items-stretch">
                    <h2 class="text-sm font-medium text-gray-400">Custom Arrows</h2>
                    <tatva-image-compare handle="arrow" hover="true" class="w-full" arrowLeft='<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M18.75 19.5l-7.5-7.5 7.5-7.5m-6 15L5.25 12l7.5-7.5" />
                      </svg>' arrowRight='<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 4.5l7.5 7.5-7.5 7.5m-6-15l7.5 7.5-7.5 7.5" />
                      </svg>' />
                </div>
            </div>

            <!-- Sample Code -->
            <div class="mt-16">
                <script
                    src="https://gist.github.com/ajitbohra/e498a15c93949062d5fc6da22a37b942.js?file=image-compare.js"></script>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex flex-col items-center mt-auto">
            <!-- Source Code -->
            <div
                class="inline-block mx-auto my-4 text-sm text-gray-500 border border-gray-300 rounded hover:bg-gray-600 hover:text-white">
                <a class="flex items-center px-2 py-1 "
                    href="https://github.com/lubusIN/tatva/blob/main/elements/tatva-image-compare.js" target="_new">
                    <svg class="w-4 mr-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z"
                            clip-rule="evenodd"></path>
                    </svg>
                    source code
                </a>
            </div>

            <!-- Work with us -->
            <div
                class="relative flex px-4 py-2 mx-auto overflow-hidden text-sm text-red-100 bg-red-800 border border-gray-200 rounded-md shadow-2xl">
                <span class="flex items-center">
                    <svg class="w-4 mr-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"
                            clip-rule="evenodd"></path>
                    </svg>
                    Work With Us
                </span>
                <svg class="w-10 h-10 -my-2 -mr-8 text-red-800 transform" fill="currentColor" viewBox="0 0 100 100"
                    preserveAspectRatio="none" aria-hidden="true">
                    <polygon points="50,0 100,0 50,100 0,100"></polygon>
                </svg>
                <a class="flex items-center px-8 ml-3 -my-2 -mr-4 italic bg-red-500 hover:underline"
                    href="mailto:info@lubus.in">info@lubus.in</a>
            </div>
        </div>
    </div>
</body>

</html>
